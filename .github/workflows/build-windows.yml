name: Build OTCv8 (Windows)

on:
  push:
    branches: [ main ]  # ejecuta en pushes a la rama main (ajustar según necesidad)
  workflow_dispatch:    # permite ejecutarlo manualmente desde Actions

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        # Opcional: podríamos cachear la carpeta C:\vcpkg\installed para acelerar builds posteriores

      - name: Configure CMake
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_TRIPLET: x86-windows-static   # usar librerías estáticas de 32 bits
          VCPKG_BINARY_SOURCES: clear                 # evitar caches binarios en CI
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A Win32 ^
             -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake ^
             -DVCPKG_MANIFEST_MODE=ON

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: otc-client-windows
          path: build\Release\otclient*.exe
